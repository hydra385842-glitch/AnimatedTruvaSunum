    #loading {
      position: fixed; inset: 0;
      background: #09090b;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      font-family: 'Cinzel', serif;
      transition: opacity 0.8s ease;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }

      color: #fbbf24; margin-bottom: 1rem;
      text-shadow: 0 0 40px rgba(251,191,36,0.5);
      animation: pulse-glow 2s ease-in-out infinite;

    .loading-sub {
      font-size: 0.7rem; letter-spacing: 0.4em;

    .loading-bar-wrap {
      width: 240px; height: 2px;
      background: #27272a; border-radius: 4px; overflow: hidden;

      height: 100%; background: linear-gradient(90deg, #92400e, #fbbf24, #92400e);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease;

    .loading-dots { margin-top: 1.2rem; color: #52525b; font-size: 0.65rem; letter-spacing: 0.3em; }

      0%   { background-position: 200% 0; }

function useAudioEngine(enabled, mood) {
  const synthRef = useRef(null);
  const droneRef = useRef(null);
  const noiseRef = useRef(null);
  const drumRef = useRef(null);
  const fxSynthRef = useRef(null);
  const startedRef = useRef(false);
  useEffect(() => {
    if (!enabled) return;
    let mounted = true;
    (async () => {
      if (startedRef.current) return;
      await Tone.start();
      if (!mounted) return;
      const reverb = new Tone.Reverb({
        decay: 10,
        wet: 0.55
      }).toDestination();
      const fxVerb = new Tone.Reverb({
        decay: 2,
        wet: 0.3
      }).toDestination();

      // Ana melodik synth
      const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: {
          type: 'sine'
        },
        envelope: {
          attack: 0.5,
          decay: 0.6,
          sustain: 0.3,
          release: 3
        }
      }).connect(reverb);
      synth.volume.value = -16;

      // Drone/pad
      const drone = new Tone.PolySynth(Tone.AMSynth, {
        envelope: {
          attack: 5,
          decay: 1,
          sustain: 1,
          release: 8
        },
        modulation: {
          type: 'sine'
        }
      }).connect(reverb);
      drone.volume.value = -28;

      // Pembe gürültü (dalga/ateş)
      const noise = new Tone.Noise('pink').start();
      const noiseFilter = new Tone.Filter(400, 'lowpass').connect(reverb);
      noise.connect(noiseFilter);
      noise.volume.value = -50;

      // Davul / darbe
      const drum = new Tone.MembraneSynth({
        pitchDecay: 0.05,
        octaves: 6,
        oscillator: {
          type: 'sine'
        },
        envelope: {
          attack: 0.001,
          decay: 0.4,
          sustain: 0.01,
          release: 1.4
        }
      }).connect(reverb);
      drum.volume.value = -10;

      // FX synth — kılıç, deniz, ateş efektleri için
      const fxSynth = new Tone.MetalSynth({
        frequency: 400,
        envelope: {
          attack: 0.001,
          decay: 0.4,
          release: 0.2
        },
        harmonicity: 5.1,
        modulationIndex: 32,
        resonance: 4000,
        octaves: 1.5
      }).connect(fxVerb);
      fxSynth.volume.value = -18;
      synthRef.current = synth;
      droneRef.current = drone;
      noiseRef.current = {
        noise,
        filter: noiseFilter
      };
      drumRef.current = drum;
      fxSynthRef.current = fxSynth;
      startedRef.current = true;
    })();
    return () => {
      mounted = false;
    };
  }, [enabled]);

  // Bölüm mood’una göre drone + gürültü ayarla
  useEffect(() => {
    if (!enabled || !droneRef.current) return;
    const drone = droneRef.current;
    const noise = noiseRef.current;
    const chords = {
      wilusa: ['D2', 'A2', 'F3'],
      sea: ['E2', 'B2', 'G3'],
      clay: ['C2', 'G2', 'Eb3'],
      bronze: ['D2', 'A2', 'F#3'],
      earth: ['A1', 'E2', 'C3'],
      lyre: ['G2', 'D3', 'B3'],
      war: ['F2', 'C3', 'Ab3'],
      fire: ['E2', 'Bb2', 'F3']
    };
    const notes = chords[mood] || chords.wilusa;
    drone.releaseAll();
    setTimeout(() => drone.triggerAttack(notes), 200);
    if (noise) {
      // Deniz → dalga sesi yüksek, ateş → kıtırtı yüksek
      const vol = mood === 'fire' ? -32 : mood === 'war' ? -38 : mood === 'sea' ? -36 : -50;
      const freq = mood === 'fire' ? 1200 : mood === 'sea' ? 300 : 400;
      noise.noise.volume.rampTo(vol, 1.5);
      noise.filter.frequency.rampTo(freq, 1.5);
    }
    return () => {
      drone.releaseAll();
    };
  }, [enabled, mood]);

  // ── Geçiş sesi (mood’a göre farklı) ──
  const playTransition = useCallback(targetMood => {
    if (!enabled || !synthRef.current) return;
    const now = Tone.now();
    const drum = drumRef.current;
    const fx = fxSynthRef.current;
    const m = targetMood || mood;
    if (m === 'war' || m === 'bronze') {
      // Kılıç sesi — metalik darbe + glissando
      if (fx) {
        fx.frequency.value = 600;
        fx.triggerAttackRelease('16n', now);
      }
      if (drum) {
        drum.triggerAttackRelease('C2', '8n', now);
        drum.triggerAttackRelease('G1', '8n', now + 0.08);
      }
      synthRef.current.triggerAttackRelease('C4', '4n', now + 0.05);
      synthRef.current.triggerAttackRelease('G3', '4n', now + 0.18);
    } else if (m === 'sea') {
      // Deniz dalgası — yumuşak sweep
      synthRef.current.triggerAttackRelease('E3', '2n', now);
      synthRef.current.triggerAttackRelease('B3', '2n', now + 0.15);
      synthRef.current.triggerAttackRelease('G3', '2n', now + 0.30);
    } else if (m === 'fire') {
      // Yangın — hızlı kaotik darbeler
      if (drum) {
        drum.triggerAttackRelease('A1', '4n', now);
        drum.triggerAttackRelease('F1', '8n', now + 0.12);
        drum.triggerAttackRelease('C1', '4n', now + 0.22);
      }
      synthRef.current.triggerAttackRelease('D3', '4n', now);
      synthRef.current.triggerAttackRelease('Bb2', '4n', now + 0.18);
    } else if (m === 'lyre') {
      // Lir arpeji — nazik
      ['D3', 'F3', 'A3', 'D4'].forEach((n, i) => synthRef.current.triggerAttackRelease(n, '4n', now + i * 0.12));
    } else {
      // Varsayılan antik geçiş
      synthRef.current.triggerAttackRelease('D3', '2n', now);
      synthRef.current.triggerAttackRelease('F3', '2n', now + 0.12);
      synthRef.current.triggerAttackRelease('A3', '2n', now + 0.24);
      if (drum) drum.triggerAttackRelease('C2', '4n', now);
    }
  }, [enabled, mood]);
  const playClick = useCallback(() => {
    if (!enabled || !synthRef.current) return;
    synthRef.current.triggerAttackRelease('A4', '32n');
  }, [enabled]);
  const playHorn = useCallback(() => {
    if (!enabled || !drumRef.current) return;
    const now = Tone.now();
    drumRef.current.triggerAttackRelease('A1', '4n', now);
    drumRef.current.triggerAttackRelease('A1', '4n', now + 0.3);
  }, [enabled]);

  // Kılıç sesi (savaş bölümleri için)
  const playSword = useCallback(() => {
    if (!enabled || !fxSynthRef.current) return;
    const now = Tone.now();
    fxSynthRef.current.frequency.value = 800;
    fxSynthRef.current.triggerAttackRelease('32n', now);
    if (drumRef.current) drumRef.current.triggerAttackRelease('G1', '16n', now + 0.02);
  }, [enabled]);
  return {
    playTransition,
    playClick,
    playHorn,
    playSword
  };
}

function VisualKusatma() {
  const wrapRef = React.useRef(null);

  const [uiState, setUiState] = React.useState({ phase:'I', phaseTr:'ŞAFAK', t:0, playing:true });

  React.useEffect(() => {
    const wrap = wrapRef.current;

    const W = 1000, H = 520;

      width: W, height: H,

      if(currentFPS !== fps){
        app.ticker.maxFPS = fps;

    }
    const canvas = app.view;
    canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:block;';
    wrap.appendChild(canvas);

    const L = {

    stateRef.current = S;

    const lerp = (a,b,t) => a+(b-a)*Math.min(Math.max(t,0),1);
    const easeOut = t => 1-Math.pow(1-Math.min(Math.max(t,0),1),3);
    const easeInOut = t => { const c=Math.min(Math.max(t,0),1); return c<.5?4*c*c*c:1-Math.pow(-2*c+2,3)/2; };
    function shake(m){ S.shakeTrauma=Math.min(1,S.shakeTrauma+m/40); }
    function slo(f,d){ S.slowMo=f; S.slowMoT=d; }
    function hitFreeze(d){ S.duelHitFreezeT = Math.max(S.duelHitFreezeT, d); }

    // ── PARTICLES ─────────────────────────────────────
    function spawnSpark(x,y,n,c1=0xFFD060,c2=0xFF6020,spd=1){

    function spawnShard(x,y,n,col=0x8B6020,vs=1){

        g.drawPolygon(pts);g.endFill();g.x=x;g.y=y;

    function spawnWood(x,y,dir){

    // Push individual soldiers AWAY from approaching threat (cavalry/ram path)
    // worldX = path center, halfWidth = lane to clear, pushBackY = how much to retreat backward (in Y, +y = down/back)
    function applyClearLane(worldX, laneHalfWidth, pushBackY){
      pushBackY = pushBackY || 0;
      akhaSoldiers.forEach(s => {
        const c = s._unitC;
        const globalX = c.x + s._origLocalX + s._dodgeOffsetX;
        const distFromLane = globalX - worldX;
        const absDist = Math.abs(distFromLane);
        if(absDist < laneHalfWidth){
          // Strong push aside + retreat backward (down on screen = away from action)
          const pushDir = distFromLane >= 0 ? 1 : -1;
          const strength = 1 - (absDist / laneHalfWidth);
          // Sideways push
          const sideTarget = pushDir * (laneHalfWidth + 25) * strength;
          if(Math.abs(sideTarget) > Math.abs(s._dodgeTarget)){
            s._dodgeTarget = sideTarget;
          }
          // Backward retreat (Y +)
          const backTarget = pushBackY * strength;
          if(backTarget > s._dodgeTargetY) s._dodgeTargetY = backTarget;
        }
      });
    }
    // Reset all dodge targets (call when threat passes)
    function clearAllDodges(){
      akhaSoldiers.forEach(s => { s._dodgeTarget = 0; s._dodgeTargetY = 0; });

      }
      headG.endFill();
      head.addChild(headG);
      root.addChild(head);

      // Shield arm
      const shieldArmX = isL ? -10 : 10;
      const shieldArm = new PIXI.Container();
      shieldArm.x = shieldArmX; shieldArm.y = -3;
      const saUpper = mkPart();
      saUpper.beginFill(0xC89050,1); saUpper.drawRoundedRect(-3,0,6,13,2); saUpper.endFill();
      saUpper.beginFill(col,0.85); saUpper.drawRect(-3,0,6,4); saUpper.endFill();
      shieldArm.addChild(saUpper);
      const saLower = new PIXI.Container();
      saLower.x = 0; saLower.y = 13;
      const saLowerG = mkPart();
      saLowerG.beginFill(0xC89050,1); saLowerG.drawRoundedRect(-3,0,6,12,2); saLowerG.endFill();
      saLowerG.beginFill(0xB87848,1); saLowerG.drawCircle(0,13,2.5); saLowerG.endFill();
      saLower.addChild(saLowerG);

      const shieldGfx = mkPart();
      const shX = isL ? -10 : 10;
      shieldGfx.beginFill(0x4A2810,1); shieldGfx.drawEllipse(shX,6,19,25); shieldGfx.endFill();
      shieldGfx.beginFill(0x8B5828,1); shieldGfx.drawEllipse(shX,6,17,23); shieldGfx.endFill();
      shieldGfx.beginFill(shCol,1); shieldGfx.drawEllipse(shX,6,15,21); shieldGfx.endFill();
      shieldGfx.beginFill(isL?0xD4AA48:0x5878AA,0.9); shieldGfx.drawEllipse(shX,6,11,15); shieldGfx.endFill();
      shieldGfx.beginFill(0x8B5828,1); shieldGfx.drawCircle(shX,6,6); shieldGfx.endFill();
      shieldGfx.beginFill(isL?0xFFD060:0x8898D8,1); shieldGfx.drawCircle(shX,6,3); shieldGfx.endFill();
      shieldGfx.beginFill(0xFFFFFF,0.5); shieldGfx.drawCircle(shX-1,5,1); shieldGfx.endFill();
      shieldGfx.lineStyle(0.8, isL?0x6A3810:0x1A2848, 0.6);
      shieldGfx.drawEllipse(shX,6,13,18);
      shieldGfx.drawEllipse(shX,6,9,12);
      shieldGfx.lineStyle(0.5, isL?0x6A3810:0x1A2848, 0.4);
      for(let s=0;s<8;s++){
        const a = s*Math.PI/4;
        shieldGfx.moveTo(shX+Math.cos(a)*7, 6+Math.sin(a)*10);
        shieldGfx.lineTo(shX+Math.cos(a)*14, 6+Math.sin(a)*20);
      }
      shieldGfx.lineStyle(0);
      shieldGfx.beginFill(0xFFFFFF,0.15);
      shieldGfx.drawEllipse(isL?-15:5,-2,4,7);
      shieldGfx.endFill();
      saLower.addChild(shieldGfx);
      shieldArm.addChild(saLower);
      root.addChild(shieldArm);

      // Weapon arm
      const weaponArmX = isL ? 10 : -10;
      const weaponArm = new PIXI.Container();
      weaponArm.x = weaponArmX; weaponArm.y = -3;
      const waUpper = mkPart();
      waUpper.beginFill(0xC89050,1); waUpper.drawRoundedRect(-3,0,6,13,2); waUpper.endFill();
      waUpper.beginFill(col,0.85); waUpper.drawRect(-3,0,6,4); waUpper.endFill();
      weaponArm.addChild(waUpper);
      const waLower = new PIXI.Container();
      waLower.x = 0; waLower.y = 13;
      const waLowerG = mkPart();
      waLowerG.beginFill(0xC89050,1); waLowerG.drawRoundedRect(-3,0,6,12,2); waLowerG.endFill();
      waLowerG.beginFill(0xB87848,1); waLowerG.drawCircle(0,13,2.5); waLowerG.endFill();
      waLower.addChild(waLowerG);

      const spearGfx = mkPart();
      spearGfx.lineStyle(4, 0x6A3810, 1);
      spearGfx.moveTo(dir*-30, 13); spearGfx.lineTo(dir*88, 13);
      spearGfx.lineStyle(0);
      spearGfx.lineStyle(0.6, 0x4A2810, 0.7);
      for(let s=0;s<8;s++){
        const sx = dir*-30 + dir*(s+1)*15;
        spearGfx.moveTo(sx, 11);
        spearGfx.lineTo(sx + dir*2, 15);
      }
      spearGfx.lineStyle(0);
      for(let i=0;i<5;i++){
        const gx = dir*-5 + dir*i*5;
        spearGfx.lineStyle(1.2, 0x2A1808, 0.9);
        spearGfx.moveTo(gx, 9);
        spearGfx.lineTo(gx + dir*2, 17);
      }
      spearGfx.lineStyle(0);
      spearGfx.beginFill(0xB0B0B8,1); spearGfx.drawPolygon([dir*88,5, dir*108,13, dir*88,21]); spearGfx.endFill();
      spearGfx.beginFill(0xE8E8F0,0.7); spearGfx.drawPolygon([dir*88,7, dir*102,13, dir*88,13]); spearGfx.endFill();
      spearGfx.beginFill(0xFFFFFF,0.4); spearGfx.drawPolygon([dir*90,7, dir*98,11, dir*92,11]); spearGfx.endFill();
      spearGfx.lineStyle(0.5, 0x808088, 0.7);
      spearGfx.moveTo(dir*88,5); spearGfx.lineTo(dir*108,13); spearGfx.lineTo(dir*88,21);
      spearGfx.lineStyle(0);
      spearGfx.beginFill(0x808088,1); spearGfx.drawPolygon([dir*-30,10, dir*-40,13, dir*-30,16]); spearGfx.endFill();
      waLower.addChild(spearGfx);
      weaponArm.addChild(waLower);
      root.addChild(weaponArm);

      // Shadow
      const shad = mkPart();
      shad.beginFill(0x000000,0.4); shad.drawEllipse(0,0,27,8); shad.endFill();

      return {
        root, isL, dir,
        backLeg, frontLeg, blShin, flShin,
        backArm, baLower,
        torso, head,
        shieldArm, saLower, shieldGfx,
        weaponArm, waLower, spearGfx,
        shad,
        spearLost: false
      };
    }

    function launchFlySpear(fx,fy,tx,ty,isL){
      const g=new PIXI.Graphics();const dir=isL?1:-1;
      g.lineStyle(3,0x6A3810,1);g.moveTo(0,0);g.lineTo(dir*80,0);g.lineStyle(0);
      g.beginFill(0xB0B0B8,1);g.drawPolygon([dir*80,-7,dir*102,0,dir*80,7]);g.endFill();
      g.beginFill(0xFFFFFF,.7);g.drawRect(dir*84,-1,dir*6,2);g.endFill();
      g.x=fx;g.y=fy;L.weap.addChild(g);
      return {g,fx,fy,tx,ty,prog:0,done:false};
    }

    function spawnArrowVolley(fromL){
      for(let i=0;i<10;i++){
        const g=new PIXI.Graphics();
        const fx=fromL?(60+Math.random()*250):(W-60-Math.random()*250);
        const fy=H*.28+Math.random()*H*.1;
        const tx=fromL?(W-220+Math.random()*200):(80+Math.random()*200);
        const ty=H*.62+Math.random()*H*.06;
        g.lineStyle(1.5,0x8B6020,.92);g.moveTo(0,-14);g.lineTo(0,4);g.lineStyle(0);
        g.beginFill(0xCC4040,.9);g.drawPolygon([-2.5,-3,0,4,0,-1]);g.drawPolygon([2.5,-3,0,4,0,-1]);g.endFill();
        g.beginFill(0xC0C0C8,.95);g.drawPolygon([-2,-16,2,-16,0,-22]);g.endFill();
        g.x=fx;g.y=fy;
        const ang=Math.atan2(ty-fy,tx-fx);g.rotation=ang-Math.PI/2;
        L.weap.addChild(g);
        S.arrows.push({g,fx,fy,tx,ty,prog:0,dur:.7+Math.random()*.5,delay:i*.07,done:false});
      }
    }
    // ════════════════════════════════════════════════════
    // ── DUEL SEQUENCE — Tam istenen sıraya göre ────────
    // ════════════════════════════════════════════════════
    // 1. entry (yürüyerek giriş)
    // 2. circle (daire çizip karşılaşma)
    // 3. spear_combat (mızraklar ile yakın savaş — thrust/parry)
    // 4. retreat (geri çekilirler — mesafe açma)
    // 5. throw_l (Akhilleus mızrak fırlatır)
    // 6. hit_r (Hektor kalkanı çatlar)
    // 7. throw_r (Hektor karşı atış)
    // 8. hit_l (Akhilleus kalkanı parçalanır)
    // 9. shield_clash (kalkanlar ile birbirine vururlar)
    // 10. shield_push (yaklaşıp kalkanlar ile ittiririşler)
    // 11. shield_bash (kalkanlar ile kafalarına vururlar)
    // 12. fist_punch (yumruk atarlar)
    // 13. trip_kick (çelme + tekme)
    // 14. hek_down (Hektor yere düşer, nefes nefese)
    // 15. akh_grabs_spear (Akhilleus saplı mızrağı çıkarır)
    // 16. final_kill (işini bitirir)
    // 17. glory (Akhilleus zafer pozu)

    const DUEL_SEQ = [
      [3.5, 'entry'],
      [3.0, 'circle'],
      [3.5, 'spear_combat'],
      [1.2, 'retreat'],
      [1.6, 'throw_l'],
      [0.35, 'hit_r'],
      [1.6, 'throw_r'],
      [0.35, 'hit_l'],
      [3.0, 'shield_clash'],
      [3.0, 'shield_push'],
      [2.5, 'shield_bash'],
      [2.5, 'fist_punch'],
      [2.5, 'trip_kick'],
      [3.0, 'hek_down'],
      [2.5, 'akh_grabs_spear'],
      [1.5, 'final_kill'],
      [4.5, 'glory'],
    ];
    // total = ~43.0s ≈ 45s window

    let duelSeqIdx = 0;
    let duelSubT = 0;
    let duelFlySpearObj = null;
    let plantedSpearForKill = null;

    function duelNextPhase(){
      duelSeqIdx++;
      if(duelSeqIdx >= DUEL_SEQ.length) return;
      duelSubT = 0;
      // Kill any still-flying spear from previous phase
      if(duelFlySpearObj && !duelFlySpearObj.done){
        if(duelFlySpearObj.g && duelFlySpearObj.g.parent){
          duelFlySpearObj.g.parent.removeChild(duelFlySpearObj.g);
        }
        duelFlySpearObj = null;
      }
      const phase = DUEL_SEQ[duelSeqIdx][1];
      const msgs = {
        circle:'İKİ KAHRAMAN KARŞI KARŞIYA',
        spear_combat:'MISRAK MISRAĞA — YAKIN SAVAŞ!',
        retreat:'GERİ ÇEKİLİRLER — MESAFE AÇILIR',
        throw_l:'AKHILLEUS MIZRAĞINI FİRLATIYOR!',
        hit_r:'HEKTOR\'UN KALKANI ÇATLADI!',
        throw_r:'HEKTOR KARŞILIK VERİYOR!',
        hit_l:'KALKAN PARÇALANDI!',
        shield_clash:'KALKAN KALKANA — ÇARPIŞMA!',
        shield_push:'KALKAN İLE İTTİRİYORLAR!',
        shield_bash:'KAFASINA — KALKAN DARBESİ!',
        fist_punch:'YUMRUK YUMRUĞA!',
        trip_kick:'ÇELME — TEKME!',
        hek_down:'HEKTOR YERE DÜŞTÜ — NEFES NEFESE',
        akh_grabs_spear:'AKHILLEUS MIZRAĞI ÇEKİYOR...',
        final_kill:'İŞİNİ BİTİRDİ — ÖLÜMCÜL DARBE!',
        glory:'ZAFER! ΑΧΙΛΛΕΎς ΝΙΚΑ!'
      };
      if(msgs[phase]) showLabel(msgs[phase]);

      // Camera zoom levels
      if(phase === 'final_kill' || phase === 'akh_grabs_spear') S.cameraTargetZoom = 1.35;
      else if(phase === 'hek_down') S.cameraTargetZoom = 1.30;
      else if(phase === 'glory') S.cameraTargetZoom = 1.18;
      else if(phase === 'shield_bash' || phase === 'fist_punch' || phase === 'trip_kick') S.cameraTargetZoom = 1.25;
      else if(phase === 'shield_clash' || phase === 'shield_push' || phase === 'spear_combat') S.cameraTargetZoom = 1.20;
      else S.cameraTargetZoom = 1.05;
    }

    function tickDuel(dt){
      if(!S.duelL || !S.duelR) return;
      const HL = S.duelL, HR = S.duelR;
      const [pDur, pName] = DUEL_SEQ[duelSeqIdx] || [9999, 'idle'];
      const T = duelSubT / pDur;
      duelSubT += dt;

      // Reset all bones each frame to default neutral
      [HL, HR].forEach(H => {
        H.backLeg.rotation = 0; H.frontLeg.rotation = 0;
        H.blShin.rotation = 0; H.flShin.rotation = 0;
        H.backArm.rotation = 0; H.baLower.rotation = 0;
        H.shieldArm.rotation = 0; H.saLower.rotation = 0;
        H.weaponArm.rotation = 0; H.waLower.rotation = 0;
        H.head.rotation = 0; H.torso.rotation = 0;
      });
      const breath = Math.sin(S.t * 2.1) * 0.02;
      [HL, HR].forEach(H => { H.head.y = -10 + breath * 5; });

      // Shadow positioning
      if(HL.shad){HL.shad.x = HL.root.x; HL.shad.y = GROUND_Y+4;}
      if(HR.shad){HR.shad.x = HR.root.x; HR.shad.y = GROUND_Y+4;}

      // Camera focus on duel center
      if(pName !== 'entry'){
        const cx = (HL.root.x + HR.root.x) * 0.5;
        S.cameraTargetX = lerp(S.cameraTargetX, -(cx-W*0.5)*0.3, 0.4);
      }

      // Flying spear update
      if(duelFlySpearObj && !duelFlySpearObj.done){
        const fs = duelFlySpearObj;
        fs.prog += dt * 2.0;
        const p = Math.min(fs.prog, 1);
        fs.g.x = lerp(fs.fx, fs.tx, p);
        fs.g.y = lerp(fs.fy, fs.ty, p) - Math.sin(p*Math.PI)*55;
        const ang = Math.atan2((fs.ty-fs.fy) - Math.cos(p*Math.PI)*55*Math.PI, fs.tx-fs.fx);
        fs.g.rotation = ang;
        if(p < 0.7 && Math.random() < 0.45) spawnSpark(fs.g.x, fs.g.y, 2, 0xFFE060, 0xFF8020);
        // Remove when done OR if it went below ground
        if(p >= 1 || fs.g.y > GROUND_Y+10){
          if(fs.g.parent) fs.g.parent.removeChild(fs.g);
          duelFlySpearObj = null; fs.done = true;
        }
      }

      // ─────── PHASE LOGIC ───────

      if(pName === 'entry'){
        const tx = W*0.32, ty = GROUND_Y - 4;
        if(HL.root.x < tx) HL.root.x = Math.min(tx, HL.root.x + 95*dt);
        if(HR.root.x > W*0.68) HR.root.x = Math.max(W*0.68, HR.root.x - 95*dt);
        const wcL = Math.sin(S.t*9), wcR = Math.sin(S.t*9 + 0.4);
        HL.frontLeg.rotation = wcL * 0.4;
        HL.backLeg.rotation = -wcL * 0.4;
        HL.flShin.rotation = Math.max(0, wcL * 0.5);
        HL.blShin.rotation = Math.max(0, -wcL * 0.5);
        HL.weaponArm.rotation = -wcL * 0.3;
        HL.shieldArm.rotation = wcL * 0.3;
        HL.head.rotation = wcL * 0.04;
        HL.root.y = GROUND_Y - 4 - Math.abs(wcL)*2;
        HR.frontLeg.rotation = wcR * 0.4;
        HR.backLeg.rotation = -wcR * 0.4;
        HR.flShin.rotation = Math.max(0, wcR * 0.5);
        HR.blShin.rotation = Math.max(0, -wcR * 0.5);
        HR.weaponArm.rotation = -wcR * 0.3;
        HR.shieldArm.rotation = wcR * 0.3;
        HR.head.rotation = wcR * 0.04;
        HR.root.y = GROUND_Y - 4 - Math.abs(wcR)*2;
        if(Math.random() < 0.15){spawnDust(HL.root.x, GROUND_Y+2, 1); spawnDust(HR.root.x, GROUND_Y+2, 1);}
      }

      else if(pName === 'circle'){
        const ci = duelSubT * 0.9;
        HL.root.x = W*0.32 + Math.sin(ci)*22;
        HR.root.x = W*0.68 - Math.sin(ci)*22;
        HL.root.y = GROUND_Y - 4 + Math.sin(S.t*3)*1;
        HR.root.y = GROUND_Y - 4 + Math.sin(S.t*3+1)*1;
        HL.weaponArm.rotation = -0.2 + Math.sin(S.t*2)*0.05;
        HR.weaponArm.rotation = -0.2 + Math.sin(S.t*2+0.5)*0.05;
        HL.shieldArm.rotation = 0.15;
        HR.shieldArm.rotation = 0.15;
        HL.head.rotation = 0.03;
        HR.head.rotation = -0.03;
        if(Math.random() < 0.05){
          const mx = (HL.root.x+HR.root.x)*0.5;
          spawnSpark(mx, H*0.63-20, 3, 0xFFD060, 0xFFFFFF);
        }
      }

      // 3. SPEAR COMBAT - ilk önce mızraklar ile yakın savaş
      else if(pName === 'spear_combat'){
        // Close in if too far
        const targetGap = 130;
        const gap = HR.root.x - HL.root.x;
        if(gap > targetGap){
          HL.root.x += 50*dt;
          HR.root.x -= 50*dt;
        }
        HL.root.y = GROUND_Y - 4;
        HR.root.y = GROUND_Y - 4;

        // Alternating thrusts/parries with proper timing
        const beat = Math.sin(duelSubT * 5);
        const subBeat = Math.cos(duelSubT * 10);

        if(beat > 0){
          // Akhilleus thrusts forward
          HL.weaponArm.rotation = 0.7 + subBeat * 0.1;
          HL.waLower.rotation = -0.2;
          HL.torso.rotation = 0.12;
          HL.frontLeg.rotation = -0.25;
          HL.backLeg.rotation = 0.15;
          HL.shieldArm.rotation = 0.1;
          HL.head.rotation = 0.08;
          // Hektor parries
          HR.weaponArm.rotation = -0.5;
          HR.waLower.rotation = 0.1;
          HR.shieldArm.rotation = -0.3;
          HR.torso.rotation = -0.06;
          HR.head.rotation = -0.06;
          HR.frontLeg.rotation = 0.1;
        } else {
          // Hektor thrusts
          HR.weaponArm.rotation = 0.7 + subBeat * 0.1;
          HR.waLower.rotation = -0.2;
          HR.torso.rotation = -0.12;
          HR.frontLeg.rotation = 0.25;
          HR.backLeg.rotation = -0.15;
          HR.shieldArm.rotation = 0.1;
          HR.head.rotation = -0.08;
          // Akhilleus parries
          HL.weaponArm.rotation = -0.5;
          HL.waLower.rotation = 0.1;
          HL.shieldArm.rotation = 0.3;
          HL.torso.rotation = 0.06;
          HL.head.rotation = 0.06;
          HL.frontLeg.rotation = -0.1;
        }

        // Sparks at contact (when beats cross zero = clash)
        const rawBeat = duelSubT * 5;
        const beatPhase = rawBeat - Math.floor(rawBeat);
        if(beatPhase < 0.05 || (beatPhase > 0.5 && beatPhase < 0.55)){
          const cx = (HL.root.x + HR.root.x) * 0.5;
          spawnSpark(cx, H*0.63, 6, 0xFFD060, 0xFFFFFF);
          if(Math.random() < 0.5){
            spawnRing(cx, H*0.63, 0xFFD060, 25);
          }
        }
      }

      // 4. RETREAT - geri çekilme, mesafe açma
      else if(pName === 'retreat'){
        const targetL = W*0.22, targetR = W*0.78;
        HL.root.x = lerp(HL.root.x, targetL, easeOut(T)*0.15);
        HR.root.x = lerp(HR.root.x, targetR, easeOut(T)*0.15);
        // Backwards walking pose
        HL.weaponArm.rotation = -0.3 + Math.sin(S.t*4)*0.05;
        HR.weaponArm.rotation = -0.3 + Math.sin(S.t*4+1)*0.05;
        HL.shieldArm.rotation = 0.2;
        HR.shieldArm.rotation = 0.2;
        HL.frontLeg.rotation = -Math.sin(S.t*7)*0.3;
        HL.backLeg.rotation = Math.sin(S.t*7)*0.3;
        HR.frontLeg.rotation = -Math.sin(S.t*7+0.4)*0.3;
        HR.backLeg.rotation = Math.sin(S.t*7+0.4)*0.3;
        HL.head.rotation = 0.02;
        HR.head.rotation = -0.02;
        HL.root.y = GROUND_Y - 4 - Math.abs(Math.sin(S.t*7))*1.5;
        HR.root.y = GROUND_Y - 4 - Math.abs(Math.sin(S.t*7+0.4))*1.5;
      }

      // 5. THROW_L
      else if(pName === 'throw_l'){
        HL.root.y = GROUND_Y - 4;
        const release = T < 0.6 ? 0 : (T-0.6)/0.4;
        const windUp = Math.min(T*2, 1);
        HL.torso.rotation = -windUp * 0.25 * (1 - release);
        HL.weaponArm.rotation = -1.8 * windUp * (1 - release) + 0.5 * release;
        HL.shieldArm.rotation = 0.3;
        HL.head.rotation = -0.1 * (1 - release);
        HL.frontLeg.rotation = -0.15;
        HL.backLeg.rotation = 0.3;
        HL.flShin.rotation = 0.1;

        HR.shieldArm.rotation = -0.5;
        HR.weaponArm.rotation = -0.3;
        HR.head.rotation = -0.1;

        if(duelSubT > pDur*0.65 && !duelFlySpearObj && !HL.spearLost){
          duelFlySpearObj = launchFlySpear(HL.root.x+90, HL.root.y-8, HR.root.x-10, HR.root.y-8, true);
          HL.spearGfx.visible = false;
          HL.spearLost = true;
          S.duelSpLBroken = true;
        }
      }

      // 6. HIT_R - vuruş anlık hissi
      else if(pName === 'hit_r'){
        if(duelSubT < 0.06){
          const hx = HR.root.x, hy = HR.root.y;
          spawnImpactBurst(hx-22, hy-5, 80);
          spawnWood(hx-22, hy-5, -1);
          spawnShard(hx-22, hy-5, 12, 0x4A6A9A);
          spawnSpark(hx-22, hy-5, 40, 0xFFD060, 0xFF8020);
          spawnRing(hx-22, hy-5, 0xFFD060);
          shake(14); slo(0.25, 0.12); hitFreeze(0.02);
          S.duelRHP = 62;
          spawnDust(hx, GROUND_Y+5, 8);
          // Yere saplı mızrak ekle (sonra final kill için)
          plantSpear(hx-30 + (Math.random()-0.5)*20, GROUND_Y, -1, true);
        }
        const recoilT = Math.min(duelSubT*4, 1);
        HR.root.x = W*0.78 + Math.sin(duelSubT*22)*14*Math.exp(-duelSubT*5);
        HR.torso.rotation = 0.18 * (1 - recoilT);
        HR.shieldArm.rotation = -0.4 * (1 - recoilT) - 0.3;
        HR.head.rotation = -0.18 * (1 - recoilT);
        HL.weaponArm.rotation = 0.4;
        HL.torso.rotation = 0.1;
      }

      // 7. THROW_R
      else if(pName === 'throw_r'){
        HR.root.y = GROUND_Y - 4;
        const release = T < 0.6 ? 0 : (T-0.6)/0.4;
        const windUp = Math.min(T*2, 1);
        HR.torso.rotation = windUp * 0.25 * (1 - release);

    }
    const vigG=new PIXI.Graphics();

    const burnGlowG=new PIXI.Graphics();L.glow.addChild(burnGlowG);

      }
    }

    // ── INIT ──────────────────────────────────────
    function initAll(){
      S.t=0;S.prevPhaseIdx=-1;S.shakeTrauma=0;S.slowMo=1;S.slowMoT=0;
      S.cameraX=0;S.cameraY=0;S.cameraZoom=1;S.cameraTargetX=0;S.cameraTargetY=0;S.cameraTargetZoom=1;
      S.sparks.length=0;S.shards.length=0;S.bloods.length=0;S.dusts.length=0;S.arrows.length=0;S.embers.length=0;S.fire.length=0;S.smoke.length=0;
      // Remove planted spears from ground layer
      S.stuckSpears.forEach(sp => { if(sp.g && sp.g.parent) sp.g.parent.removeChild(sp.g); });
      S.stuckSpears.length=0;
      S.duelHitFreezeT=0;
      duelFlySpearObj=null;
      plantedSpearForKill=null;
      marchAnim.length=0;torchAnim.length=0;defenderAnim.length=0;
      cavRiders.length=0;akhaSoldiers.length=0;
      [L.bg,L.ground,L.dust,L.units,L.weap,L.fx].forEach(l=>l.removeChildren());
      L.glow.removeChildren();L.glow.addChild(burnGlowG);
      S.akhUnits=[];S.cavalry=null;S.cavSpawned=false;
      S.wall=null;S.ramCont=null;S.ramSpawned=false;S.ramHit=false;
      S.duelL=null;S.duelR=null;S.duelSpawned=false;
      S.duelLHP=100;S.duelRHP=100;S.duelActive=false;
      duelSeqIdx=0;duelSubT=0;duelFlySpearObj=null;
      plantedSpearForKill=null;
      S.duelShLBroken=false;S.duelShRBroken=false;S.duelSpLBroken=false;S.duelSpRBroken=false;S.duelHekFall=false;
      S.burnLevel=0;
      buildSky();buildStars();buildMountains();buildGround();buildTroyWall();
      // Spawn akha units in formation that will yield
      // Three rows positioned LOWER (closer to camera) so cavalry passes IN FRONT (slightly higher Y = further back)
      // Actually: cavalry at GROUND_Y, infantry slightly behind at GROUND_Y - 15 (smaller Y = higher in screen = further)
      // We need infantry NOT to be in cavalry/ram path
      // Solution: Keep infantry at left side and use applyClearLane to push them aside when cavalry/ram pass
      S.akhUnits.push(buildAkha(-340,GROUND_Y-12,32,0xFF3010));
      S.akhUnits.push(buildAkha(-240,GROUND_Y-10,24,0xFF6020));
      S.akhUnits.push(buildAkha(-140,GROUND_Y-8,16,0xFFE060));
    }

    // ── MAIN TICK ──────────────────────────────────
    app.ticker.add((delta)=>{
      if(!uiRef.current.playing) return;
      // Switch FPS based on scene (duel = 60fps, rest = 30fps)
      const inDuel = S.t >= 75 && S.t < 135;
      setFPS(inDuel ? 60 : 30);
      // Convert delta to dt (cap prevents huge jumps when FPS changes)
      const rawDt=Math.min(delta/60, 0.05);
      let dt = rawDt * (S.slowMoT > 0 ? S.slowMo : 1);
      if(S.slowMoT > 0){ S.slowMoT -= rawDt; if(S.slowMoT <= 0) S.slowMo = 1; }
      // Hit freeze: VERY short slowmo instead of zero-dt (prevents stuck animation)
      if(S.duelHitFreezeT > 0){
        S.duelHitFreezeT -= rawDt;
        dt *= 0.05; // 95% slow but still ticking
      }

      if(uiRef.current.scrubbing){S.t=uiRef.current.scrubTarget;}
      else{S.t+=dt;if(S.t>=TOTAL){S.t=0;initAll();return;}}

      const pIdx=PHASES.findIndex((p,i)=>S.t>=p.s&&S.t<p.e);
      if(pIdx!==-1&&pIdx!==S.prevPhaseIdx){
        S.prevPhaseIdx=pIdx;
        showLabel(PHASES[pIdx].name+' · '+PHASES[pIdx].tr);
        setUiState(u=>({...u,phase:PHASES[pIdx].name,phaseTr:PHASES[pIdx].tr}));
      }

      // Camera
      const trauma2=S.shakeTrauma*S.shakeTrauma;
      const sx=(Math.random()-.5)*24*trauma2;
      const sy=(Math.random()-.5)*18*trauma2;
      const rotShake=(Math.random()-.5)*.04*trauma2;
      S.shakeTrauma=Math.max(0,S.shakeTrauma-rawDt*1.4);
      S.cameraX=lerp(S.cameraX,S.cameraTargetX,.04);
      S.cameraY=lerp(S.cameraY,S.cameraTargetY,.04);
      S.cameraZoom=lerp(S.cameraZoom,S.cameraTargetZoom,.05);
      worldContainer.x=S.cameraX+sx+W/2;
      worldContainer.y=S.cameraY+sy+H/2;
      worldContainer.scale.set(S.cameraZoom);
      worldContainer.pivot.set(W/2,H/2);
      worldContainer.rotation=rotShake;

      // Stars
      starAnim.forEach(sg=>{
        sg.alpha=sg._ba*(.55+.45*Math.sin(S.t*sg._spd+sg._off));
        if(sg.bright)sg.scale.set(1+.3*Math.sin(S.t*sg._spd+sg._off));
      });
      torchAnim.forEach(tg=>{
        tg.scale.x=1+Math.sin(S.t*8+tg._off)*.12;
        tg.scale.y=1+Math.sin(S.t*7+tg._off)*.18;
        tg.skew.x=Math.sin(S.t*5+tg._off)*.08;
      });
      if(Math.random()<.08&&torchAnim.length){
        const tt=torchAnim[Math.floor(Math.random()*torchAnim.length)];
        if(tt.parent&&S.wall)spawnEmber(S.wall.x+tt.x,S.wall.y+tt.y-12,1);
      }
      defenderAnim.forEach(({g,off})=>{g.y=8+Math.sin(S.t*2+off)*.6;});

      // March animation - includes 2D dodge (pushed aside + retreat from cavalry/ram)
      marchAnim.forEach(({g, soldier, off})=>{
        if(g) g.y = -Math.abs(Math.sin(S.t*8 + off))*3.5;
        if(soldier){
          // Smoothly approach dodge targets
          soldier._dodgeOffsetX = lerp(soldier._dodgeOffsetX, soldier._dodgeTarget, 0.12);
          soldier._dodgeOffsetY = lerp(soldier._dodgeOffsetY, soldier._dodgeTargetY, 0.12);
          soldier.x = soldier._origLocalX + soldier._dodgeOffsetX;
          soldier.y = soldier._origLocalY + soldier._dodgeOffsetY;
        }
      });

      // Cavalry animation - LOW BOB, locked to ground
      cavRiders.forEach(r=>{
        const phase = S.t * 6 + r._phase;
        const bob = Math.max(0, Math.sin(phase)) * 2.2;
        r.y = r._baseY - bob;
        r.rotation = Math.sin(phase) * 0.022;
      });

      // Particles
      for(let i=S.sparks.length-1;i>=0;i--){
        const sp=S.sparks[i];sp.life-=dt;
        if(sp.life<=0){(sp.isUI?L.ui:L.fx).removeChild(sp.g);S.sparks.splice(i,1);continue;}
        const lt=sp.life/sp.maxLife;
        if(sp.isFlash){sp.g.alpha=lt*.95;continue;}
        if(sp.isRing){const pr=1-lt;sp.g.clear();sp.g.lineStyle(4*lt,sp.col,lt*.9);sp.g.drawCircle(sp.x,sp.y,sp.maxR*pr);continue;}
        sp.vx*=.92;sp.vy+=sp.gravity||.5;sp.g.x+=sp.vx*dt*60;sp.g.y+=sp.vy*dt*60;sp.g.alpha=lt;
      }
      for(let i=S.shards.length-1;i>=0;i--){
        const sh=S.shards[i];sh.life-=dt;
        if(sh.life<=0){L.fx.removeChild(sh.g);S.shards.splice(i,1);continue;}
        sh.vy+=.38;sh.g.x+=sh.vx*dt*60;sh.g.y+=sh.vy*dt*60;sh.g.rotation+=sh.rot*dt*60;sh.g.alpha=sh.life/sh.maxLife;
      }
      for(let i=S.bloods.length-1;i>=0;i--){
        const b=S.bloods[i];b.life-=dt;
        if(b.life<=0){L.fx.removeChild(b.g);S.bloods.splice(i,1);continue;}
        b.vy+=.55;b.g.x+=b.vx*dt*60;b.g.y+=b.vy*dt*60;b.g.alpha=b.life/b.maxLife;
      }
      for(let i=S.dusts.length-1;i>=0;i--){
        const d=S.dusts[i];d.life-=dt;
        if(d.life<=0){L.dust.removeChild(d.g);S.dusts.splice(i,1);continue;}
        d.g.x+=d.vx*dt*60;d.g.y+=d.vy*dt*60;
        const lt=d.life/d.maxLife;d.g.alpha=lt*.4;d.g.scale.set(1+(1-lt)*2.8);
      }
      for(let i=S.embers.length-1;i>=0;i--){
        const em=S.embers[i];em.life-=dt;
        if(em.life<=0){L.fx.removeChild(em.g);S.embers.splice(i,1);continue;}
        em.g.x+=em.vx*dt*60;em.g.y+=em.vy*dt*60;
        em.g.alpha=(em.life/em.maxLife)*.9;em.vy*=.99;
      }
      for(let i=S.arrows.length-1;i>=0;i--){
        const ar=S.arrows[i];if(ar.delay>0){ar.delay-=rawDt;continue;}
        ar.prog+=dt/ar.dur;
        // Remove: reached target OR fell below ground OR timed out
        const arY = lerp(ar.fy,ar.ty,ar.prog)-Math.sin(ar.prog*Math.PI)*85;
        if(ar.prog>=1 || arY > GROUND_Y+10 || ar.prog > 1.2){
          if(ar.g.parent) ar.g.parent.removeChild(ar.g);
          S.arrows.splice(i,1);continue;
        }
        ar.g.x=lerp(ar.fx,ar.tx,ar.prog);ar.g.y=arY;
        const ang=Math.atan2((ar.ty-ar.fy)-Math.cos(ar.prog*Math.PI)*85*Math.PI,ar.tx-ar.fx);
        ar.g.rotation=ang-Math.PI/2;
      }
      if(S.burnLevel>.05){
        if(Math.random()<S.burnLevel*1.0){
          const g=new PIXI.Graphics();const x=480+W*.4*(Math.random()-.5);const sz=5+Math.random()*16;
          g.beginFill(Math.random()<.5?0xFF6020:0xFF3010,.85);g.drawEllipse(0,0,sz*.6,sz);g.endFill();
          g.x=x;g.y=GROUND_Y;L.fx.addChild(g);
          S.fire.push({g,vx:(Math.random()-.5)*1.5,vy:-(3+Math.random()*5),life:.7+Math.random()*.6,maxLife:.7});
          S.fire[S.fire.length-1].maxLife=S.fire[S.fire.length-1].life;
        }
        if(Math.random()<S.burnLevel*.4){
          const g=new PIXI.Graphics();g.beginFill(0x2A1808,.4);g.drawCircle(0,0,12+Math.random()*22);g.endFill();
          g.x=480+W*.42*(Math.random()-.5);g.y=H*.65;L.dust.addChild(g);
          S.smoke.push({g,vx:(Math.random()-.5)*.8,vy:-(1+Math.random()*2),life:2+Math.random()*1.5,maxLife:2});
          S.smoke[S.smoke.length-1].maxLife=S.smoke[S.smoke.length-1].life;
        }
        if(Math.random()<S.burnLevel*.5)spawnEmber(480+W*.35*(Math.random()-.5),H*.7,1);
      }
      for(let i=S.fire.length-1;i>=0;i--){
        const fp=S.fire[i];fp.life-=dt;
        if(fp.life<=0){L.fx.removeChild(fp.g);S.fire.splice(i,1);continue;}
        fp.g.x+=fp.vx*dt*60;fp.g.y+=fp.vy*dt*60;fp.g.alpha=(fp.life/fp.maxLife)*.85;
      }
      for(let i=S.smoke.length-1;i>=0;i--){
        const sm=S.smoke[i];sm.life-=dt;
        if(sm.life<=0){L.dust.removeChild(sm.g);S.smoke.splice(i,1);continue;}
        sm.g.x+=sm.vx*dt*60;sm.g.y+=sm.vy*dt*60;
        const lt=sm.life/sm.maxLife;sm.g.alpha=lt*.32;sm.g.scale.set(1+(1-lt)*3.2);
      }

      const t=S.t;

      if(t<12){if(Math.random()<.005)spawnDust(200+Math.random()*600,GROUND_Y+5,1);S.cameraTargetX=0;S.cameraTargetZoom=1;}

      if(t>=12&&t<30){
        const m=easeInOut((t-12)/18);
        S.akhUnits.forEach((u,i)=>{u.x=lerp(u.x,-60+i*70+m*280,.05);});
        if(Math.random()<.15)spawnDust(S.akhUnits[0].x+50,GROUND_Y+5,1);
        S.cameraTargetX=-m*30;S.cameraTargetZoom=1.02;
      }

      if(t>=30&&t<52){
        if(Math.random()<.04)spawnArrowVolley(true);
        if(Math.random()<.025)spawnArrowVolley(false);
        if(Math.random()<.08)spawnDust(350+Math.random()*300,H*.65+Math.random()*40,1);
        if(Math.random()<.02&&S.wall)spawnSpark(S.wall.x+Math.random()*340,S.wall.y+Math.random()*180,6,0xFFD060,0xFF8020);
        S.cameraTargetX=-10;S.cameraTargetZoom=1.05;
        // Reset infantry dodge
        akhaSoldiers.forEach(s => s._dodgeTarget = 0);
      }

      // ── PHASE IV: CAVALRY (army yields and retreats) ──
      if(t>=52&&t<75){
        if(!S.cavSpawned){S.cavSpawned=true;S.cavalry=buildCavalryGroup(-440,GROUND_Y);}
        const cT=easeOut((t-52)/23);
        if(S.cavalry){
          S.cavalry.x = lerp(-440, 420, cT);
          // Pre-emptively clear path 80px ahead of cavalry, with backward retreat
          // Each rider creates a clearance zone, plus a forward warning zone
          cavRiders.forEach((r, i) => {
            const globalX = S.cavalry.x + r.x;
            // Larger clearance + retreat backward (Y+30)
            applyClearLane(globalX, 50, 30);
            // Warning zone ahead (50-100px ahead) with smaller retreat
            applyClearLane(globalX + 80, 60, 20);
          });
        }
        if(Math.random()<.12)spawnDust(S.cavalry?S.cavalry.x+200:W*.5,GROUND_Y+5,1);
        if(t>65&&Math.random()<.18){
          const cx=S.cavalry?S.cavalry.x+250:W*.6;
          spawnSpark(cx+Math.random()*90,GROUND_Y-10,5,0xFF6020,0xFFD060);
          if(Math.random()<.3)spawnBlood(cx+Math.random()*70,GROUND_Y-15,3);
        }
        if(t>72&&t<72.2){shake(20);spawnDust(W*.7,GROUND_Y+5,10);}
        S.cameraTargetX=-20;S.cameraTargetZoom=1.06;
      } else if(t >= 75 && t < 135){
        // After cavalry passed - infantry returns to formation slowly
        clearAllDodges();
      }

      // ── PHASE V-VII: DUEL ──
      if(t>=75&&t<76&&!S.duelSpawned){
        S.duelSpawned=true;
        // Clear any lingering arrows/projectiles before duel
        S.arrows.forEach(ar=>{ if(ar.g.parent) ar.g.parent.removeChild(ar.g); });
        S.arrows.length=0;
        L.weap.removeChildren();
        S.duelL=buildDuelHero(true);S.duelR=buildDuelHero(false);
        S.duelL.root.x=-120;S.duelL.root.y=GROUND_Y-4;
        S.duelR.root.x=W+120;S.duelR.root.y=GROUND_Y-4;S.duelR.root.scale.x=-1;
        L.units.addChild(S.duelL.shad,S.duelR.shad,S.duelL.root,S.duelR.root);
        S.duelActive=true;duelSeqIdx=0;duelSubT=0;
        showLabel('ΜΟΝΟΜΑΧΙΑ — DÜELLO BAŞLIYOR!');
      }
      if(S.duelActive&&t<125)tickDuel(dt);
      if(t>=125){S.duelActive=false;S.cameraTargetZoom=1;S.cameraTargetX=0;}
      updateHP();

      // ── PHASE VIII: RAM (army yields and retreats) ──
      if(t>=135&&t<155){
        if(!S.ramSpawned){S.ramSpawned=true;S.ramCont=buildRam();}
        const rT=easeInOut((t-135)/18);
        if(S.ramCont){
          S.ramCont.x=200+rT*270;
          // Wide clearance with backward retreat
          // Ram body spans 0-170, plus warning zone ahead
          applyClearLane(S.ramCont.x + 85, 110, 35);   // ram body wide
          applyClearLane(S.ramCont.x + 200, 80, 25);   // forward warning
          applyClearLane(S.ramCont.x - 20, 80, 25);    // trailing zone
        }
        if(Math.random()<.1&&S.ramCont)spawnDust(S.ramCont.x+80,GROUND_Y+5,1);
        if(t>152&&!S.ramHit){
          S.ramHit=true;shake(28);
          spawnShard(W-390+165,GROUND_Y-10,18,0x5A3818);
          spawnSpark(W-390+165,GROUND_Y-10,35,0xFFD060,0xFF8020);
          spawnShockwave(W-390+165,GROUND_Y-10,0xFF8020);
          addCrack(W-390+165,GROUND_Y);spawnDust(W-390+165,GROUND_Y+5,14);
        }
        if(S.ramHit&&S.ramCont)S.ramCont.x=200+270+Math.sin(t*28)*4*Math.exp(-(t-152)*2);
        S.cameraTargetX=-30;S.cameraTargetZoom=1.05;
      } else if(t >= 155 && t < 170){
        // Restore infantry positions
        clearAllDodges();
      }

      if(t>=155&&t<157){
        if(t<155.1){
          shake(28);
          spawnShard(W-390+165,GROUND_Y-50,35,0x5A3818,1.5);
          spawnSpark(W-390+165,GROUND_Y-40,65,0xFF8020,0xFFD060);
          spawnShockwave(W-390+165,GROUND_Y-40,0xFFD060);
          addCrack(W-390+165,GROUND_Y+5);spawnDust(W-390+165,H*.68,26);
          if(S.wall)S.wall.alpha=.45;
          showLabel('KAPI YIKILDI — AKHA SALDIRISI!');
        }
        S.cameraTargetX=-30;S.cameraTargetZoom=1.1;
      }

      if(t>=170){S.burnLevel=Math.min(1,(t-170)/22);S.cameraTargetX=-20;S.cameraTargetZoom=1.05;}
      updateBurnGlow();
      if(t>=195){
        if(t>=218&&Math.floor(t*2)%2===0)showLabel('TRUVA DÜŞTÜ · ΤΡΟΙΑ ΕΑΛΩ · MÖ 1180');
        S.cameraTargetX=0;S.cameraTargetZoom=1.02;
      }

      const pNow=PHASES[S.prevPhaseIdx>=0?S.prevPhaseIdx:0];
      hudTxt.text=pNow?pNow.name+' · '+pNow.tr:'';
      tmrTxt.text=Math.floor(t)+'s / '+TOTAL+'s';
      setUiState(u=>({...u,t:Math.floor(t)}));
      if(lblT>0){lblT-=rawDt;if(lblT<.5)lblTxt.alpha=Math.max(0,lblT/.5);}
    });

    initAll();
    return ()=>{app.destroy(true,{children:true,texture:true});};
  }, []);

  const {phase,t,playing}=uiState;
  const onScrubDown=(e)=>{
    uiRef.current.scrubbing=true;
    const rect=e.currentTarget.getBoundingClientRect();
    const pct=(e.clientX-rect.left)/rect.width;
    uiRef.current.scrubTarget=Math.max(0,Math.min(220,pct*220));
    if(stateRef.current)stateRef.current.t=uiRef.current.scrubTarget;
  };
  const onScrubMove=(e)=>{
    if(!uiRef.current.scrubbing)return;
    const rect=e.currentTarget.getBoundingClientRect();
